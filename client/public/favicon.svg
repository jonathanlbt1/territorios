<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="mapGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c87f2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pinGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ee5a5a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#mapGradient)"/>
  
  <!-- Map fold lines -->
  <path d="M16 20 L24 18 L32 22 L40 18 L48 20 L48 44 L40 46 L32 42 L24 46 L16 44 Z" 
        fill="white" 
        opacity="0.95"
        stroke="none"/>
  
  <!-- Map section dividers -->
  <line x1="24" y1="18" x2="24" y2="46" stroke="#0c87f2" stroke-width="1" opacity="0.4"/>
  <line x1="32" y1="22" x2="32" y2="42" stroke="#0c87f2" stroke-width="1" opacity="0.4"/>
  <line x1="40" y1="18" x2="40" y2="46" stroke="#0c87f2" stroke-width="1" opacity="0.4"/>
  
  <!-- Location pin -->
  <path d="M32 14 C26 14 22 18.5 22 24 C22 31 32 40 32 40 C32 40 42 31 42 24 C42 18.5 38 14 32 14 Z" 
        fill="url(#pinGradient)"
        stroke="white"
        stroke-width="2"/>
  
  <!-- Pin center dot -->
  <circle cx="32" cy="24" r="4" fill="white"/>
</svg>
