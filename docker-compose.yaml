version: '3.8'

services:
  db:
    image: postgres:17
    container_name: territorios-db
    environment:
      POSTGRES_DB: territorios_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
    ports:
      - "5432:5432"
    volumes:
      - territorios-postgres-data:/var/lib/postgresql/data
    networks:
      - territorios-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d territorios_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: territorios-server
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Database Configuration
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: territorios_db
      DB_USER: postgres
      DB_PASSWORD: 123
      VAPID_PUBLIC_KEY: BG0s1s1Qk3v0-Mej0_EpgQM3aJwlB1rmhbd8g_V317xlc4BJ6cdp4VcoH7RBcaNWEe9JWrFeeKbaAKadAd1Cupc
      VAPID_PRIVATE_KEY: fLS09l-sqtIl8fCZxElS87qzUjeWdWtH23uj56ZuSsY
      
      # JWT Configuration
      JWT_SECRET: +gY/Jbn3MjbfgRjiFOYr4ILqondwfk/CiAmST7/yzeUT4PrZHaxF6SKU3F0yrDGmQliEX7wrtg5aF67MZiVj3w==
      JWT_EXPIRES_IN: 1d
      
      # Server Configuration
      PORT: 3001
      NODE_ENV: development
    ports:
      - "3001:3001"
    networks:
      - territorios-network
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: territorios-client
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - territorios-network
    restart: unless-stopped

networks:
  territorios-network:
    driver: bridge

volumes:
  territorios-postgres-data:
